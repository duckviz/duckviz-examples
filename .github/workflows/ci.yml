name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  typecheck-and-build:
    name: ${{ matrix.example }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        example: [next-app]
    defaults:
      run:
        working-directory: ${{ matrix.example }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bunx tsc --noEmit
      - run: bun run build
